<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naqshbandi App</title>
  <link rel="icon" type="image/jpeg" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(180deg, #000, #021d14);
  margin: 0;
  color: white;
}

/* HEADER */
header {
  background: rgba(0, 110, 55, 0.7);
  backdrop-filter: blur(12px);
  padding: 20px 0;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
  margin: 10px 0 0;
  font-size: 24px;
}

/* MAIN */
main {
  padding: 20px;
  max-width: 900px;
  margin: auto;
  padding-bottom: 90px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #021d14;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
}

/* BUTTONS (SURAH) */
button {
  padding: 18px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

button:hover {
  transform: translateY(-4px) scale(1.02);
  background: rgba(16, 185, 129, 0.25);
}

/* AYAH CARD */
.ayah {
  background: rgba(255,255,255,0.06);
  padding: 20px;
  border-radius: 22px;
  margin-bottom: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  transition: 0.25s;
}

.ayah:hover {
  transform: translateY(-2px);
}

/* ARABIC TEXT */
.arabic {
  text-align: right;
  font-size: 1.8em;
  line-height: 2;
  font-family: 'Amiri', serif;
  color: #00e676;
  margin-bottom: 12px;
}

/* TRANSLATION */
.translation {
  font-size: 0.95em;
  color: #ccc;
  line-height: 1.5;
}

/* AUDIO BUTTON */
.audio-btn {
  margin-top: 10px;
  padding: 8px 14px;
  border-radius: 12px;
  background: rgba(0,230,118,0.2);
  border: none;
  color: #00e676;
  cursor: pointer;
  transition: 0.2s;
}

.audio-btn:hover {
  background: rgba(0,230,118,0.4);
}

/* BACK BUTTON */
.back {
  margin-bottom: 20px;
  display: inline-block;
  color: #00e676;
  font-weight: bold;
  cursor: pointer;
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.nav-item {
  text-align: center;
  font-size: 12px;
  color: white;
  text-decoration: none;
}

.nav-item span {
  display: block;
  font-size: 20px;
}

/* MOBILE */
@media (max-width: 600px) {
  .arabic {
    font-size: 1.4em;
  }
}


  </style>
</head>
<body>

<header>
  <img src="logo.png" style="height:90px;">
  <h1>Naqshbandi Sufi</h1>
</header>
    <footer>
        © 2026 Naqshbandi Sufi | Waseem Idoe
        </footer>

<main>
  <div id="surahList" class="grid"></div>
  <div id="surahView"></div>
</main>

       <!-- NAVBAR -->
    <div class="navbar">
    <a href="index.html" class="nav-item"><span>🏠</span>Home</a>
    <a href="home.html" class="nav-item"><span>📘</span>Handleiding</a>
    <a href="quran.html" class="nav-item"><span>🤲</span>Quran</a>
    </div>

<script>
const surahList = document.getElementById("surahList");
const surahView = document.getElementById("surahView");

fetch("https://api.alquran.cloud/v1/surah")
  .then(res => res.json())
  .then(data => {
    data.data.forEach(s => {
      const btn = document.createElement("button");
      btn.innerHTML = `<b>${s.number}. ${s.englishName}</b><br>${s.name}`;
      btn.onclick = () => loadSurah(s.number, s.number !== 1);
      surahList.appendChild(btn);
    });
  });

function loadSurah(number, addBismillah) {
  surahList.style.display = "none";
  surahView.innerHTML = "Loading...";

  fetch(`https://api.alquran.cloud/v1/surah/${number}/editions/quran-uthmani,en.asad`)
    .then(res => res.json())
    .then(data => {
      const arabic = data.data[0].ayahs;
      const translation = data.data[1].ayahs;

      let html = `<div class='back' onclick='goBack()'>← Terug</div>`;
      html += `<h2>${data.data[0].englishName}</h2>`;

      const audioIds = [];

      if (addBismillah) {
        const bismillahId = 'audioBismillah';
        html += `
          <div class="ayah">
            <div class="arabic">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
            <div class="translation">In the name of God, the Most Gracious, the Most Merciful</div>
            <button class='audio-btn' onclick="playSequence('${bismillahId}')">▶️ Afspelen</button>
            <audio id='${bismillahId}' src='https://cdn.islamic.network/quran/audio/128/ar.alafasy/1.mp3'></audio>
          </div>
        `;
        audioIds.push(bismillahId);
      }

      arabic.forEach((a, i) => {
        const ayahGlobalNumber = a.number;
        const ayahId = `audio${ayahGlobalNumber}`;
        html += `
          <div class="ayah">
            <div class="arabic">${a.text}</div>
            <div class="translation">${translation[i].text}</div>
            <button class='audio-btn' onclick="playSequence('${ayahId}')">▶️ Afspelen</button>
            <audio id='${ayahId}' src='https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayahGlobalNumber}.mp3'></audio>
          </div>
        `;
        audioIds.push(ayahId);
      });

      surahView.innerHTML = html;

      // functie om ayahs automatisch achter elkaar af te spelen
      window.playSequence = function(startId) {
        let index = audioIds.indexOf(startId);
        function playNext() {
          if (index >= audioIds.length) return;
          const audio = document.getElementById(audioIds[index]);
          audio.play();
          audio.onended = () => {
            index++;
            playNext();
          };
        }
        playNext();
      };
    });
}

function goBack() {
  surahView.innerHTML = "";
  surahList.style.display = "grid";
}



</script>

</body>
</html>
